{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>


<body>
    {% block navbar %}
    <div class="collapse" id="navbarToggleExternalContent">
        <div class="bg-primary p-4">
            <h5 class="text-white h4">All Content</h5>
        </div>
        <div class="bg-dark p-4">
            <div class="d-flex flex-wrap gap-2 justify-content-center my-3">
                <a href="{% url 'portfolio' %}" class="btn btn-outline-primary">Portfolio</a>
                <a href="{% url 'add_user_profile' %}" class="btn btn-outline-primary">Add User</a>
                <a href="{% url 'home' %}" class="btn btn-outline-primary">Blog</a>
                <a href="{% url 'add_post' %}" class="btn btn-outline-primary">Add Blog</a>
                <a href="{% url 'admin:index' %}" class="btn btn-outline-primary">Admin</a>
            </div>
        </div>
    </div>
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <br>
    <br>
    {% endblock navbar %}

    {% block content %}
    {% endblock content %}
    <button onclick="goToTop()" class="btn btn-primary position-fixed bottom-0 end-0 m-4 rounded-circle">
    ↑
    </button>
    <script src="{% static 'blog/scroll_to_top.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
